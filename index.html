<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังเพลง - เลือก Playlist 🎸</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background-color: #1e272e;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #fbc531; margin-top: 40px; margin-bottom: 30px; font-size: 28px; }
        
        .playlist-grid {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        /* ปุ่ม Playlist ขนาดใหญ่ กดง่ายบน Tablet */
        .playlist-card {
            display: flex;
            align-items: center;
            padding: 20px;
            background-color: #2f3640;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }
        .playlist-card:hover {
            background-color: #3f4754;
            transform: translateY(-2px);
        }
        .playlist-icon { margin-right: 15px; font-size: 24px; }
    </style>
</head>
<body>

    <h1>🎸 คลังคอร์ดเพลงออฟไลน์</h1>

    <div class="playlist-grid">
        <a href="songs.html?p=playlist1" class="playlist-card">
            <span class="playlist-icon">🎵</span> Playlist 1: เพลงฮิตซ้อมบ่อย
        </a>
        <a href="songs.html?p=playlist2" class="playlist-card">
            <span class="playlist-icon">❤️</span> Playlist 2: เพลงรัก/อกหัก
        </a>
        <a href="songs.html?p=playlist3" class="playlist-card">
            <span class="playlist-icon">🎸</span> Playlist 3: เพลงเพื่อชีวิต/ร็อค
        </a>
		 <a href="songs.html?p=playlist4" class="playlist-card">
            <span class="playlist-icon">🎸</span> Playlist 4: รวม
        </a>
    </div>

</body>
</html>
