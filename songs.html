<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังเพลง - รายชื่อเพลง 🎸</title>
    <style>
        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #1e272e; color: #fff;
            display: flex; flex-direction: column;
        }
        
        /* 1. ส่วนควบคุมด้านบน (Header) */
        .header-section {
            background-color: #2f3640; 
            padding: 10px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            z-index: 10;
        }
        .top-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 8px; 
        }
        .back-btn {
            background: #485460; color: white; text-decoration: none;
            padding: 6px 12px; border-radius: 6px; font-size: 14px; font-weight: bold;
            transition: 0.2s;
        }
        .back-btn:hover { background: #718093; }
        #playlistTitle { 
            font-size: 18px; margin: 0; color: #fbc531; flex: 1; text-align: center; 
        }
        
        /* ช่องค้นหาเพลง */
        #searchBar {
            width: 100%; padding: 10px 15px; font-size: 15px; border: none;
            border-radius: 20px; background-color: #3f4754; color: white; outline: none;
            margin-bottom: 10px;
        }
        
        /* 2. ปรับเป็นระบบ Grid กระจายแถว ไม่ต้องสไลด์ซ้าย-ขวา */
        .song-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* แบ่งหน้าจอเป็น 3 คอลัมน์เท่าๆ กัน */
            gap: 6px; /* ระยะห่างระหว่างปุ่มเพลง */
            padding: 5px 0; 
            margin: 0;
            list-style: none;
            max-height: 550px; /* คุมความสูงของโซนรายชื่อเพลงไว้เพื่อให้พื้นที่คอร์ดด้านล่างกว้างที่สุด */
            overflow-y: auto; /* เผื่อกรณีเพลงเยอะจัดจนล้นกล่อง จะเลื่อนลงมาแนวดิ่งได้นิดหน่อย */
        }
        .song-item { margin: 0; }
        .song-btn {
            display: block; 
            padding: 8px 4px; 
            background-color: #485460;
            color: #fff; 
            border-radius: 8px; 
            text-decoration: none;
            font-size: 13px; 
            font-weight: bold; 
            text-align: center;
            cursor: pointer; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* ถ้าชื่อเพลงยาวไปจะตัดท้ายเป็น ... เพื่อไม่ให้ปุ่มเบี้ยว */
            transition: 0.1s;
        }
        .song-btn.selected { background-color: #20bf6b; color: #fff; }

        /* 3. พื้นที่แสดงรูปภาพคอร์ดเพลง (เหลือพื้นที่จุใจด้านล่าง) */
        .chord-viewer {
            flex: 1; 
            display: flex; justify-content: center;
            align-items: flex-start; 
            overflow-y: auto; padding: 10px;
        }
        #chordImage {
            max-width: 100%; height: auto; border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: none;
        }
        .placeholder-text { color: #718093; font-size: 16px; margin-top: 80px; text-align: center; }
    </style>
</head>

<div class="header-section">

    function filterSongs() {
        let input = document.getElementById('searchBar').value.toLowerCase();
        let li = document.getElementById('songList').getElementsByClassName('song-item');
        for (let i = 0; i < li.length; i++) {
            let btn = li[i].getElementsByClassName('song-btn')[0];
            if ((btn.textContent || btn.innerText).toLowerCase().indexOf(input) > -1) {
                li[i].style.display = "";
            } else {
                li[i].style.display = "none";
            }
        }
    }
